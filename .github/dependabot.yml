version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: "weekly"
    # Wait 5 days before updating to help circumvent supply chain attacks
    cooldown:
      default-days: 5
      # Exclude plugin-e2e to prevent false positives with canary e2e tests
      exclude:
        - "@grafana/plugin-e2e"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      # eslint 10 is blocked: eslint-plugin-react has no eslint-10-compatible
      # release, and @grafana/eslint-config 10 breaks the create-plugin scaffold
      # (.config/eslint.config.mjs imports the removed flat.js export; stylistic
      # plugin was renamed). Remove both once eslint-plugin-react supports
      # eslint 10 AND @grafana/create-plugin updates the scaffold — see PR #67.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@grafana/eslint-config"
        update-types: ["version-update:semver-major"]
    groups:
      unit-test:
        patterns:
          - "@testing-library/*"
          - "jest*"
          - "@types/jest"
      eslint:
        patterns:
          - "@grafana/eslint-config"
          - "eslint*"
          - "@typescript-eslint/*"
          - "@stylistic/*"
      grafana:
        patterns:
          - "@grafana/*"
        dependency-type: "production"
        # Include majors so @grafana/* packages are always bumped together
        # (a lone @grafana/data major PR mixes v12/v13 types — see #49)
        update-types:
          - "major"
          - "minor"
          - "patch"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    open-pull-requests-limit: 5

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    allow:
      - dependency-name: "github.com/grafana/grafana-plugin-sdk-go"
        dependency-type: "all"
    commit-message:
      prefix: "chore"
      include: "scope"

