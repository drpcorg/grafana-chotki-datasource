name: Release

on:
  push:
    tags:
      - 'v*' # Run workflow on version tags, e.g. v1.0.0.

permissions: read-all

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      GRAFANA_ACCESS_POLICY_TOKEN: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set version from tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CURRENT_VERSION=$(jq -r .version package.json)
          if [ "${CURRENT_VERSION}" != "${TAG_VERSION}" ]; then
            echo "Updating package.json version from ${CURRENT_VERSION} to ${TAG_VERSION}"
            npm version "${TAG_VERSION}" --no-git-tag-version --allow-same-version
          else
            echo "package.json already at version ${TAG_VERSION}"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Check for backend
        id: check-for-backend
        run: |
          if [ -f "Magefile.go" ]; then
            echo "has-backend=true" >> $GITHUB_OUTPUT
          else
            echo "has-backend=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Go environment
        if: steps.check-for-backend.outputs.has-backend == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build backend
        if: steps.check-for-backend.outputs.has-backend == 'true'
        uses: magefile/mage-action@a662bd8c29d8106879588cfff83b2faf6e6f59db # v4.0.0
        with:
          version: latest
          args: buildAll

      - name: Sign plugin (optional)
        if: ${{ env.GRAFANA_ACCESS_POLICY_TOKEN != '' }}
        run: npm run sign

      - name: Get plugin metadata
        id: metadata
        run: |
          export GRAFANA_PLUGIN_ID=$(jq -r .id dist/plugin.json)
          export GRAFANA_PLUGIN_VERSION=$(jq -r .info.version dist/plugin.json)
          echo "plugin-id=${GRAFANA_PLUGIN_ID}" >> $GITHUB_OUTPUT
          echo "plugin-version=${GRAFANA_PLUGIN_VERSION}" >> $GITHUB_OUTPUT

      - name: Package release artifacts
        id: package
        run: |
          set -euo pipefail

          PLUGIN_ID='${{ steps.metadata.outputs.plugin-id }}'
          PLUGIN_VERSION='${{ steps.metadata.outputs.plugin-version }}'
          OUT_DIR='release-artifacts'
          mkdir -p "${OUT_DIR}"

          FULL_ARCHIVE="${PLUGIN_ID}-${PLUGIN_VERSION}.zip"
          LINUX_ARCHIVE="${PLUGIN_ID}-${PLUGIN_VERSION}-linux.zip"

          TMP_FULL=$(mktemp -d)
          cp -R dist "${TMP_FULL}/${PLUGIN_ID}"
          (
            cd "${TMP_FULL}"
            zip -qr "${FULL_ARCHIVE}" "${PLUGIN_ID}"
          )
          mv "${TMP_FULL}/${FULL_ARCHIVE}" "${OUT_DIR}/${FULL_ARCHIVE}"
          rm -rf "${TMP_FULL}"

          TMP_LINUX=$(mktemp -d)
          cp -R dist "${TMP_LINUX}/${PLUGIN_ID}"
          find "${TMP_LINUX}/${PLUGIN_ID}" -maxdepth 1 -type f \( -name '*_darwin_*' -o -name '*_windows_*' \) -delete
          (
            cd "${TMP_LINUX}"
            zip -qr "${LINUX_ARCHIVE}" "${PLUGIN_ID}"
          )
          mv "${TMP_LINUX}/${LINUX_ARCHIVE}" "${OUT_DIR}/${LINUX_ARCHIVE}"
          rm -rf "${TMP_LINUX}"

          sha256sum "${OUT_DIR}/${FULL_ARCHIVE}" > "${OUT_DIR}/${FULL_ARCHIVE}.sha256"
          sha256sum "${OUT_DIR}/${LINUX_ARCHIVE}" > "${OUT_DIR}/${LINUX_ARCHIVE}.sha256"

          echo "full-archive=${OUT_DIR}/${FULL_ARCHIVE}" >> $GITHUB_OUTPUT
          echo "full-sha=${OUT_DIR}/${FULL_ARCHIVE}.sha256" >> $GITHUB_OUTPUT
          echo "linux-archive=${OUT_DIR}/${LINUX_ARCHIVE}" >> $GITHUB_OUTPUT
          echo "linux-sha=${OUT_DIR}/${LINUX_ARCHIVE}.sha256" >> $GITHUB_OUTPUT

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.package.outputs.full-archive }}
            ${{ steps.package.outputs.full-sha }}
            ${{ steps.package.outputs.linux-archive }}
            ${{ steps.package.outputs.linux-sha }}
